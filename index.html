<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/puppy-day-web/">

  <!--
    coi-serviceworker registers a service worker that rewrites response headers
    so the page becomes cross-origin isolated (crossOriginIsolated === true),
    unlocking SharedArrayBuffer + OPFS for the Drift WASM database. Without it,
    Drift drops to a degraded IndexedDB fallback tier that crashes at startup on
    this app's storage path.

    GitHub Pages can't set Cross-Origin-Opener-Policy / Cross-Origin-Embedder-
    Policy headers itself; this JS shim emulates them via a service worker, so we
    get cross-origin isolation on Pages without changing hosts. On first load the
    SW installs and reloads once; thereafter the page boots already isolated.
    MUST load BEFORE flutter_bootstrap.js. (Same approach as the puppypath PWA.)
  -->
  <script src="coi-serviceworker.min.js"></script>

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <!-- viewport-fit=cover is REQUIRED for iOS to expose the safe-area insets
       (env(safe-area-inset-*)) to the web view. Without it, MediaQuery.viewPadding
       is always zero on an iOS Home-Screen PWA, so the black-translucent status bar
       runs the AppBar under the notch and the bottom NavigationBar sits under the
       home indicator. Flutter only auto-injects a viewport tag when none exists, so
       declaring our own here (with viewport-fit=cover) is what takes effect. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Log your puppy's day — naps, meals, potty, training — and see the trend a vet would care about.">

  <!-- Theme color — matches manifest.json + the app's seed (teal). -->
  <meta name="theme-color" content="#009688">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <!-- iOS-specific standalone flag — REQUIRED for the status-bar style below to
       take effect on a Home-Screen PWA. Without it, iOS ignores the style and
       fills the top safe-area inset with the manifest background_color (cream),
       which shows as a light strip under the notch over the dark app. -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <!-- black-translucent: the web view runs edge-to-edge and the app paints the
       safe-area inset itself (Flutter's AppBar already respects the top inset),
       so the strip matches the app in both light and dark instead of being a
       fixed color. -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Puppy Day">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Puppy Day</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
