<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/puppy-day-web/">

  <!--
    coi-serviceworker registers a service worker that rewrites response headers
    so the page becomes cross-origin isolated (crossOriginIsolated === true),
    unlocking SharedArrayBuffer + OPFS for the Drift WASM database. Without it,
    Drift drops to a degraded IndexedDB fallback tier that crashes at startup on
    this app's storage path.

    GitHub Pages can't set Cross-Origin-Opener-Policy / Cross-Origin-Embedder-
    Policy headers itself; this JS shim emulates them via a service worker, so we
    get cross-origin isolation on Pages without changing hosts. On first load the
    SW installs and reloads once; thereafter the page boots already isolated.
    MUST load BEFORE flutter_bootstrap.js. (Same approach as the puppypath PWA.)
  -->
  <script src="coi-serviceworker.min.js"></script>

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Log your puppy's day — naps, meals, potty, training — and see the trend a vet would care about.">

  <!-- Theme color — matches manifest.json + the app's seed (teal). -->
  <meta name="theme-color" content="#009688">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Puppy Day">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Puppy Day</title>
  <link rel="manifest" href="manifest.json">

  <!-- Standard Flutter viewport (scale-locked). This is exactly what Flutter
       auto-injects when no viewport is present, declared explicitly so it sits
       alongside the style below. KEEP maximum-scale/user-scalable=no — dropping
       them (or adding viewport-fit=cover) breaks Flutter web's pointer/zoom
       handling and locks input. Mirrors puppypath's working PWA. -->
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">

  <!-- iOS Safari colors the standalone-PWA status-bar strip from the BODY
       background (NOT theme-color). With no body background it defaults to a
       white band over the app. Match the app's M3 surface (scaffold/AppBar bg)
       per color scheme so the strip blends in instead of showing white. Hexes
       are ColorScheme.fromSeed(Colors.teal).surface for each brightness — resync
       if the default seed changes. (Proven pattern: puppypath's web/index.html.) -->
  <style>
    html { height: 100%; }
    body {
      margin: 0;
      min-height: 100%;
      background-color: #F4FBF8; /* teal-seed LIGHT surface */
    }
    @media (prefers-color-scheme: dark) {
      body { background-color: #0E1513; } /* teal-seed DARK surface */
    }
  </style>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
